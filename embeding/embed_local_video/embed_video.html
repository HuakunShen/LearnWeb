<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Embed Video</title>
    </head>
    <body>
        <embed type="video/mp4" src="./video.mp4" width="1000" height="800" />
        <video width="400" controls>
            <source
                src="./video.mp4"
                type="video/mp4"
                height="80vh"
                width="800"
            />
        </video>
    </body>
</html>
